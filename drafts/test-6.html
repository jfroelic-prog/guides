<script>
(function(){
  // Print/PDF works everywhere, even on a local file — wire it first.
  var pdf=document.getElementById("pdfBtn"); if(pdf) pdf.onclick=function(){ window.print(); };
  // When viewed locally (file://) the OTHER share controls don't apply — hide them.
  if(location.protocol==="file:"){
    ["homeLink","copyLinkBtn","openTab"].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display="none";});
    return;
  }
  var openTab=document.getElementById("openTab"); if(openTab) openTab.href=location.href;
  var btn=document.getElementById("copyLinkBtn");
  if(btn) btn.onclick=function(){
    var url=location.href, label=btn.textContent;
    function done(ok){ if(ok){ btn.textContent="✓ Copied!"; setTimeout(function(){btn.textContent=label;},1600); } else { var inp=document.createElement("input"); inp.className="home"; inp.readOnly=true; inp.value=url; inp.style.width="260px"; inp.title="Press Ctrl/Cmd-C to copy"; btn.replaceWith(inp); inp.focus(); inp.select(); } }
    function legacy(){ try{var ta=document.createElement("textarea");ta.value=url;ta.setAttribute("readonly","");ta.style.position="fixed";ta.style.top="-1000px";document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,url.length);var ok=document.execCommand("copy");ta.remove();done(ok);}catch(e){done(false);} }
    try{ if(navigator.clipboard&&window.isSecureContext){ navigator.clipboard.writeText(url).then(function(){done(true);},legacy); return; } }catch(e){}
    legacy();
  };
})();
</script>

<script>
(function(){
  // Floating chapters: toggle on small screens + highlight the section in view.
  var toc=document.getElementById("toc"); if(!toc) return;
  var btn=document.getElementById("tocToggle");
  if(btn) btn.onclick=function(){ var o=toc.classList.toggle("open"); btn.setAttribute("aria-expanded",o); };
  var links=[].slice.call(toc.querySelectorAll("a"));
  links.forEach(function(a){ a.addEventListener("click",function(){ if(window.innerWidth<=920) toc.classList.remove("open"); }); });
  var heads=[].slice.call(document.querySelectorAll("h2.chapter"));
  function spy(){
    var cur=heads[0];
    for(var i=0;i<heads.length;i++){ if(heads[i].getBoundingClientRect().top<=130) cur=heads[i]; }
    links.forEach(function(a){ a.classList.toggle("active", !!cur && a.getAttribute("href")==="#"+cur.id); });
  }
  window.addEventListener("scroll",spy,{passive:true}); window.addEventListener("resize",spy); spy();
})();
