name: Build guide index

on:
  push:
    branches: [main]
    paths:
      - "*.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so guide dates are accurate

      - name: Rebuild guides.json
        run: python3 build_index.py

      - name: Commit updated index
        run: |
          git config user.name "guide-indexer"
          git config user.email "actions@users.noreply.github.com"
          git add guides.json
          git diff --cached --quiet || git commit -m "Auto-update guide index"
          git push
